<svg width="100%" viewBox="0 0 680 940" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
<title>Agent flow from user question to answer</title>
<desc>A flowchart showing how a user question moves through a LangGraph agent: router selects tools, tools query different data sources, results are synthesised into a grounded answer, then validated by guardrails before being returned. All nodes shown in a single grey ramp.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<style>
.box { fill: #F1EFE8; stroke: #888780; stroke-width: 0.5; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 11px; font-weight: 400; fill: #5F5E5A; }
.arr { stroke: #5F5E5A; stroke-width: 1; fill: none; }
</style>

<!-- User question -->
<g>
<rect class="box" x="240" y="20" width="200" height="44" rx="8"/>
<text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">User question</text>
</g>
<line x1="340" y1="64" x2="340" y2="100" class="arr" marker-end="url(#arrow)"/>

<!-- Router -->
<g>
<rect class="box" x="220" y="100" width="240" height="56" rx="8"/>
<text class="th" x="340" y="120" text-anchor="middle" dominant-baseline="central">Router (LLM)</text>
<text class="ts" x="340" y="140" text-anchor="middle" dominant-baseline="central">Plans which tools to call</text>
</g>

<!-- branch lines down to tools row -->
<line x1="340" y1="156" x2="340" y2="180" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="180" x2="92" y2="180" class="arr"/>
<line x1="340" y1="180" x2="248" y2="180" class="arr"/>
<line x1="340" y1="180" x2="432" y2="180" class="arr"/>
<line x1="340" y1="180" x2="588" y2="180" class="arr"/>
<line x1="92" y1="180" x2="92" y2="200" class="arr" marker-end="url(#arrow)"/>
<line x1="248" y1="180" x2="248" y2="200" class="arr" marker-end="url(#arrow)"/>
<line x1="432" y1="180" x2="432" y2="200" class="arr" marker-end="url(#arrow)"/>
<line x1="588" y1="180" x2="588" y2="200" class="arr" marker-end="url(#arrow)"/>

<!-- Tool row: 4 boxes, 152px wide, 16px gaps -->
<g>
<rect class="box" x="16" y="200" width="152" height="60" rx="8"/>
<text class="th" x="92" y="220" text-anchor="middle" dominant-baseline="central">Asset lookup</text>
<text class="ts" x="92" y="240" text-anchor="middle" dominant-baseline="central">Resolve asset ID</text>
</g>

<g>
<rect class="box" x="172" y="200" width="152" height="60" rx="8"/>
<text class="th" x="248" y="220" text-anchor="middle" dominant-baseline="central">Telemetry tool</text>
<text class="ts" x="248" y="240" text-anchor="middle" dominant-baseline="central">Energy and faults</text>
</g>

<g>
<rect class="box" x="356" y="200" width="152" height="60" rx="8"/>
<text class="th" x="432" y="220" text-anchor="middle" dominant-baseline="central">Maintenance tool</text>
<text class="ts" x="432" y="240" text-anchor="middle" dominant-baseline="central">Logs and schedules</text>
</g>

<g>
<rect class="box" x="512" y="200" width="152" height="60" rx="8"/>
<text class="th" x="588" y="220" text-anchor="middle" dominant-baseline="central">RAG tool</text>
<text class="ts" x="588" y="240" text-anchor="middle" dominant-baseline="central">Search OEM manual</text>
</g>

<!-- error handling note box -->
<g>
<rect class="box" x="16" y="296" width="648" height="64" rx="8"/>
<text class="th" x="340" y="318" text-anchor="middle" dominant-baseline="central">Error handling</text>
<text class="ts" x="340" y="338" text-anchor="middle" dominant-baseline="central">Missing asset ID, empty date range, or typo asset ID</text>
<text class="ts" x="340" y="354" text-anchor="middle" dominant-baseline="central">return informative messages, not exceptions</text>
</g>

<!-- arrows from tools down to error/results -->
<line x1="92" y1="260" x2="92" y2="296" class="arr" marker-end="url(#arrow)"/>
<line x1="248" y1="260" x2="248" y2="296" class="arr" marker-end="url(#arrow)"/>
<line x1="432" y1="260" x2="432" y2="296" class="arr" marker-end="url(#arrow)"/>
<line x1="588" y1="260" x2="588" y2="296" class="arr" marker-end="url(#arrow)"/>

<!-- arrow down to synthesiser -->
<line x1="340" y1="360" x2="340" y2="400" class="arr" marker-end="url(#arrow)"/>

<!-- Synthesiser -->
<g>
<rect class="box" x="160" y="400" width="360" height="60" rx="8"/>
<text class="th" x="340" y="420" text-anchor="middle" dominant-baseline="central">Synthesiser (LLM)</text>
<text class="ts" x="340" y="440" text-anchor="middle" dominant-baseline="central">Writes grounded answer with source citations</text>
</g>
<line x1="340" y1="460" x2="340" y2="500" class="arr" marker-end="url(#arrow)"/>

<!-- Guardrails -->
<g>
<rect class="box" x="160" y="500" width="360" height="130" rx="8"/>
<text class="th" x="340" y="524" text-anchor="middle" dominant-baseline="central">Guardrails validation</text>
<text class="ts" x="340" y="548" text-anchor="middle" dominant-baseline="central">Citations present and valid</text>
<text class="ts" x="340" y="568" text-anchor="middle" dominant-baseline="central">Numeric faithfulness check</text>
<text class="ts" x="340" y="588" text-anchor="middle" dominant-baseline="central">No hallucination phrases</text>
<text class="ts" x="340" y="608" text-anchor="middle" dominant-baseline="central">Semantic judge if needed</text>
</g>
<line x1="340" y1="630" x2="340" y2="670" class="arr" marker-end="url(#arrow)"/>

<!-- Confidence block -->
<g>
<rect class="box" x="200" y="670" width="280" height="60" rx="8"/>
<text class="th" x="340" y="690" text-anchor="middle" dominant-baseline="central">Confidence score</text>
<text class="ts" x="340" y="710" text-anchor="middle" dominant-baseline="central">Score from 0 to 1, with breakdown</text>
</g>
<line x1="340" y1="730" x2="340" y2="770" class="arr" marker-end="url(#arrow)"/>

<!-- Final answer -->
<g>
<rect class="box" x="200" y="770" width="280" height="60" rx="8"/>
<text class="th" x="340" y="790" text-anchor="middle" dominant-baseline="central">Answer to user</text>
<text class="ts" x="340" y="810" text-anchor="middle" dominant-baseline="central">Cited text plus confidence block</text>
</g>
</svg>
