llm:
  model: "gpt-4o-mini"
  temperature: 0.0
  max_tokens: 1500
  streaming: true

embeddings:
  model: "text-embedding-3-small"
  batch_size: 64

vectorstore:
  persist_directory: ".chroma_db"
  # Only the manual is embedded — it's the only truly unstructured source.
  # telemetry  → pandas (8,844 numeric rows — aggregation/ranking needed)
  # maintenance → pandas (188 rows, only 15 unique template descriptions)
  # assets     → registry dict (50 rows, pure key-value lookup)
  collection: "manual_docs"
  retrieval_k: 5

chunking:
  manual_chunk_size: 600
  manual_chunk_overlap: 100

data:
  path: "data"

guardrails:
  min_confidence: 0.5
  bad_date_patterns:
    - "\\b202[56]-\\d{2}-\\d{2}\\b"
    - "i (made up|fabricated|invented)"
